<div class="card h-100 shadow-sm">
  <img *ngIf="trip.image" class="card-img-top" [src]="trip.image && trip.image.startsWith('http') ? trip.image : 'http://localhost:3000/images/' + trip.image" alt="{{ trip.name }}" />

  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start gap-2">
      <div>
        <h5 class="card-title mb-1">{{ trip.name }}</h5>
        <div class="small text-muted">Trip Code: {{ trip.tripCode }}</div>
      </div>
      <span class="badge text-bg-primary" *ngIf="trip.price">{{ trip.price }}</span>
    </div>

    <p class="card-text mt-2 mb-3" *ngIf="trip.description">{{ trip.description }}</p>

    <div class="mt-auto d-flex justify-content-between align-items-center">
      <div class="small text-muted" *ngIf="trip.length">Length: {{ trip.length }}</div>
      <div class="btn-group btn-group-sm" *ngIf="canEdit; else loginToEdit">
        <button type="button" class="btn btn-outline-secondary" (click)="onEdit()">Edit</button>
        <button type="button" class="btn btn-outline-danger" (click)="onDelete()">Delete</button>
      </div>
      <ng-template #loginToEdit>
        <span class="badge text-bg-secondary">Login to edit</span>
      </ng-template>
    </div>
  </div>
</div>
